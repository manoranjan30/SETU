services:
  # BACKEND SERVICE (Split from 'app')
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-builder
    container_name: setu_backend_dev
    command: npm run start:prod:migrated
    ports:
      - "3000:3000"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: admin
      DATABASE_PASSWORD: password
      DATABASE_NAME: setu_db
      JWT_SECRET: supersecretkey
      PDF_TOOL_URL: http://pdf-tool:8002
      FIREBASE_SERVICE_ACCOUNT_PATH: firebase-service-account.json
      RUN_DB_MIGRATIONS: "true"
      DB_MIGRATION_SCRIPT: migration:run:dist
      UPLOAD_DIR: /app/backend/uploads
      APK_UPLOAD_MAX_MB: 500
    volumes:
      - ./backend/uploads:/app/backend/uploads
    depends_on:
      - db

  # FRONTEND SERVICE (Split from 'app')
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    container_name: setu_frontend_dev
    # The source tree is bind-mounted while node_modules lives in a Docker
    # volume. Reconcile it with package-lock.json on startup so newly added
    # frontend dependencies are never hidden by a stale volume.
    command: sh -c "npm ci --no-audit --no-fund && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend

  pdf-tool:
    build:
      context: ./tools/pdf_processor
      dockerfile: Dockerfile
    container_name: setu_pdf_tool_dev
    ports:
      - "8001:8001"
    volumes:
      - ./tools/pdf_processor:/app
    command: uvicorn app:app --host 0.0.0.0 --port 8001 --reload

  # disable original app
  app:
    profiles: [ "donotstart" ]
