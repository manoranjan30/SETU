name: setu_mobile
description: SETU Construction Project Management Mobile App
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  
  # Local Storage
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  # Navigation
  go_router: ^13.0.1
  
  # UI Components
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  confetti: ^0.7.0
  cached_network_image: ^3.3.1
  flutter_native_splash: ^2.3.9
  
  # Camera & Media
  camera: ^0.10.5+7
  image_picker: ^1.0.7
  image: ^4.1.3
  flutter_image_compress: ^2.2.0
  flutter_cache_manager: ^3.3.1
  photo_view: ^0.14.0
  signature: ^5.4.0

  # Background tasks
  workmanager: ^0.9.0
  shared_preferences: ^2.2.2
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Connectivity
  connectivity_plus: ^5.0.2

  # QR Code Scanner (server URL setup)
  mobile_scanner: ^5.2.3

  # Push Notifications (Firebase)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.0.0

  # File opening / sharing
  open_file: ^3.3.2

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.2
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  bloc_test: ^9.1.5
  drift_dev: ^2.14.0
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

flutter_native_splash:
  color: "#1976D2"
  color_dark: "#0D47A1"
  android: true
  ios: true
  web: false
